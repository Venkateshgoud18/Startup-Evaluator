<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Startup Evaluator - Neo-Brutalist Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f4f4f0;
      --main-black: #111111;
      --primary: #FFDE59;
      --secondary: #FF66C4;
      --accent: #00E5FF;
      --success: #00FF66;
      --border-width: 4px;
      --shadow-offset: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: var(--bg-color);
      color: var(--main-black);
      line-height: 1.6;
      padding: 40px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .brutal-card {
      background: white;
      border: var(--border-width) solid var(--main-black);
      box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--main-black);
      padding: 24px;
      margin-bottom: 32px;
      transition: all 0.2s ease;
    }

    .brutal-title {
      font-size: 2.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -1px;
      margin-bottom: 24px;
      display: inline-block;
      background: var(--primary);
      padding: 8px 16px;
      border: var(--border-width) solid var(--main-black);
      box-shadow: 4px 4px 0px var(--main-black);
    }

    .brutal-btn {
      background: var(--accent);
      color: var(--main-black);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 12px 24px;
      border: var(--border-width) solid var(--main-black);
      box-shadow: 4px 4px 0px var(--main-black);
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .brutal-btn:hover { background: var(--secondary); }
    .brutal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .brutal-btn:active:not(:disabled) {
      transform: translate(4px, 4px);
      box-shadow: 0px 0px 0px var(--main-black);
    }

    .brutal-btn.small {
      font-size: 0.9rem;
      padding: 8px 16px;
      box-shadow: 2px 2px 0px var(--main-black);
    }

    .brutal-input {
      width: 100%;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      padding: 12px;
      border: var(--border-width) solid var(--main-black);
      margin-bottom: 16px;
      background: #fff;
    }

    .brutal-input:focus {
      outline: none;
      background: #f0f0f0;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .stat-box {
      background: var(--primary);
      border: 3px solid var(--main-black);
      padding: 16px;
      text-align: center;
      font-weight: bold;
    }

    .stat-box.high { background: var(--success); }
    .stat-box.danger { background: var(--secondary); }

    .stat-value { font-size: 2rem; }
    .stat-label { font-size: 0.8rem; text-transform: uppercase; }

    #stateDashboard, #scenarioSection, #logSection { display: none; }

    .scenario-choices {
      display: flex; gap: 16px; margin-top: 24px; flex-wrap: wrap; align-items: flex-start;
    }

    .choice-group {
      display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 250px;
    }

    .choice-preview {
      font-size: 0.9rem; font-weight: bold; color: var(--main-black); text-align: center;
      background: #fff; padding: 4px; border: 2px solid #000;
    }

    .brutal-spinner-square {
      display: none; width: 20px; height: 20px; background: var(--main-black);
      border: 2px solid var(--bg-color); box-shadow: 3px 3px 0px var(--main-black);
      animation: brutal-flip 0.8s infinite alternate ease-in-out;
    }

    @keyframes brutal-flip {
      0% { transform: perspective(400px) rotateY(0deg); background: var(--accent); }
      50% { background: var(--primary); }
      100% { transform: perspective(400px) rotateY(180deg); background: var(--secondary); }
    }

    .tier-badge {
      display: inline-block; padding: 4px 12px; font-weight: 700; text-transform: uppercase;
      border: 3px solid var(--main-black); box-shadow: 2px 2px 0px var(--main-black);
      font-size: 0.9rem; margin-bottom: 8px;
    }
    .tier-Easy { background: var(--success); }
    .tier-Medium { background: var(--primary); }
    .tier-Hard { background: var(--secondary); color: white; }

    pre {
      background: var(--main-black); color: var(--success); padding: 16px;
      overflow-x: auto; border: var(--border-width) solid var(--main-black); max-height: 400px;
    }

    .top-controls {
      display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="top-controls">
      <h1 class="brutal-title">Simulator v1</h1>
      <div style="display:flex; gap:12px; align-items:center;">
        <button id="modeBusiness" class="brutal-btn small" style="background: var(--primary);" onclick="setMode('business')">🏢 Business</button>
        <button id="modeNonprofit" class="brutal-btn small" style="background: #fff;" onclick="setMode('nonprofit')">🤝 Non-Profit</button>
        <button class="brutal-btn small" onclick="toggleLog()" style="margin-left:8px;">Toggle AI Console</button>
      </div>
    </div>

    <!-- Pitch Section -->
    <div id="pitchSection" class="brutal-card" style="background: var(--secondary)">
      <h2 id="pitchTitle">1. Pitch Your Startup</h2>
      <p style="margin-bottom: 16px;">Feed the AI your idea for initial evaluation.</p>

      <div style="display: flex; gap: 16px;">
        <div style="flex: 1;">
          <label>Problem</label>
          <input type="text" id="inProblem" class="brutal-input" value="People are too busy to cook healthy meals.">
        </div>
        <div style="flex: 1;">
          <label>Solution</label>
          <input type="text" id="inSolution" class="brutal-input"
            value="A smart microwave that cooks chef-quality meals.">
        </div>
      </div>

      <div style="display: flex; gap: 16px;">
        <div style="flex: 1;">
          <label id="lblUsers">Target Users</label>
          <input type="text" id="inUsers" class="brutal-input" value="Busy Consumers">
        </div>
        <div style="flex: 1;">
          <label id="lblBudget">Starting Budget ($)</label>
          <input type="number" id="inBudget" class="brutal-input" value="25000">
        </div>
      </div>

      <div style="margin-top: 8px; display: flex; align-items: center; gap: 16px;">
        <button class="brutal-btn" onclick="analyzeStartup()">Analyze Pitch</button>
        <span id="loaderAnalyze" class="brutal-spinner-square"></span>
      </div>
    </div>

    <!-- State Dashboard -->
    <div id="stateDashboard" class="brutal-card" style="background: #fff">
      <h2>2. Live Dashboard — Month <span id="monthHeading">1</span> (<span id="startupTypeHeading"></span>)
      </h2>
      <div class="stats-grid" id="statsGrid">
        <!-- Stats injected here -->
      </div>

      <!-- Breakdown Metrics -->
      <div
        style="margin-top: 16px; padding: 12px; background: #eee; border: 3px solid #111; font-weight: bold; display: flex; justify-content: space-between;">
        <span><span id="lblScore1">Idea Clarity:</span> <span id="scoreIdea"></span>/100</span>
        <span><span id="lblScore2">Market Fit:</span> <span id="scoreMarket"></span>/100</span>
        <span><span id="lblScore3">Scalability:</span> <span id="scoreScale"></span>/100</span>
      </div>

      <div style="margin-top: 24px; display: flex; align-items: center; gap: 16px;">
        <select id="scenarioDifficulty" class="brutal-input"
          style="width: auto; margin: 0; padding: 10px; font-weight: bold; cursor: pointer;">
          <option value="Easy">Easy</option>
          <option value="Medium" selected>Medium</option>
          <option value="Hard">Hard</option>
        </select>
        <button class="brutal-btn" onclick="fetchScenario()">Generate Next Scenario</button>
        <span id="loaderScenario" class="brutal-spinner-square"></span>
      </div>
    </div>

    <!-- Scenario / Challenge Section -->
    <div id="scenarioSection" class="brutal-card" style="background: var(--primary)">
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <h2>3. Monthly Challenge 🚨</h2>
        <span id="scenarioTierBadge" class="tier-badge" style="display:none;"></span>
      </div>
      <p id="scenarioText" style="font-size: 1.1rem; margin: 16px 0; white-space: pre-wrap; line-height: 1.6;"></p>

      <div class="scenario-choices" id="choicesContainer">
        <!-- Buttons injected here -->
      </div>

      <div id="feedbackSuggestions" style="display: none; margin-top: 16px; padding: 16px; background: #fff; border: var(--border-width) solid var(--main-black); box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--main-black);">
        <h3 id="suggestionsTitle" style="margin-bottom: 8px; text-transform: uppercase;">Strategic Suggestions</h3>
        <ul id="suggestionsList" style="margin-left: 20px; font-weight: bold;"></ul>
      </div>

      <!-- After selection, options to get feedback -->
      <div id="feedbackOptions" style="display: none; margin-top: 24px; gap: 16px; align-items: center;">
        <button class="brutal-btn" style="background: #fff;" onclick="getFeedback('explain')">🤖 Detailed Summary</button>
        <button class="brutal-btn" style="background: var(--success);" onclick="getFeedback('summarize')">🤖 Quick
          Summary</button>
        <span id="loaderChoice" class="brutal-spinner-square"></span>
      </div>
    </div>

    <!-- Logs Section -->
    <div id="logSection" class="brutal-card">
      <h2>AI Console Log</h2>
      <pre id="logOutput">// Awaiting initialization...</pre>
    </div>

  </div>

  <script>
    const API_URL = 'http://localhost:8080/api';
    let currentState = null;
    let pendingDecision = null; // Stores what the user picked to feed to feedback API
    let stateBeforeDecision = null; // Saves state before simulation step
    let currentAppMode = 'business';

    function setMode(mode) {
      currentAppMode = mode;
      document.getElementById('modeBusiness').style.background = mode === 'business' ? 'var(--primary)' : '#fff';
      document.getElementById('modeNonprofit').style.background = mode === 'nonprofit' ? 'var(--success)' : '#fff';
      
      if (mode === 'nonprofit') {
        document.getElementById('lblUsers').innerText = "Target Community";
        document.getElementById('lblBudget').innerText = "Initial Grant ($)";
        document.getElementById('pitchSection').style.background = "var(--success)";
        document.getElementById('pitchTitle').innerText = "1. Pitch Your NGO";
        document.getElementById('inProblem').value = "Lack of clean drinking water in rural villages.";
        document.getElementById('inSolution').value = "Deploying solar-powered water purifiers.";
        document.getElementById('inUsers').value = "Rural villagers";
      } else {
        document.getElementById('lblUsers').innerText = "Target Users";
        document.getElementById('lblBudget').innerText = "Starting Budget ($)";
        document.getElementById('pitchSection').style.background = "var(--secondary)";
        document.getElementById('pitchTitle').innerText = "1. Pitch Your Startup";
        document.getElementById('inProblem').value = "People are too busy to cook healthy meals.";
        document.getElementById('inSolution').value = "A smart microwave that cooks chef-quality meals.";
        document.getElementById('inUsers').value = "Busy Consumers";
      }
    }

    function toggleLoader(id, show) {
      document.getElementById(id).style.display = show ? 'inline-block' : 'none';
    }

    function toggleLog() {
      const logSec = document.getElementById('logSection');
      logSec.style.display = logSec.style.display === 'block' ? 'none' : 'block';
    }

    function log(title, obj) {
      const logger = document.getElementById('logOutput');
      logger.innerText = `[${title}]\n` + JSON.stringify(obj, null, 2) + "\n\n" + logger.innerText;
    }

    async function analyzeStartup() {
      toggleLoader('loaderAnalyze', true);
      const payload = {
        problem: document.getElementById('inProblem').value,
        solution: document.getElementById('inSolution').value,
        target_users: document.getElementById('inUsers').value,
        budget: parseInt(document.getElementById('inBudget').value),
        mode: currentAppMode
      };

      try {
        const res = await fetch(`${API_URL}/analyze-startup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        toggleLoader('loaderAnalyze', false);
        log('ANALYSIS RESULT', data);

        currentState = data._initialState;

        document.getElementById('startupTypeHeading').innerText = data.startup_type;
        updateDashboard(currentState);
        document.getElementById('stateDashboard').style.display = 'block';
        document.getElementById('scenarioSection').style.display = 'none';

      } catch (e) {
        toggleLoader('loaderAnalyze', false);
        log('ERROR', e);
      }
    }

    function updateDashboard(state) {
      if (!state) return;
      document.getElementById('monthHeading').innerText = state.month;

      const grid = document.getElementById('statsGrid');
      const statCard = (label, val, themeClass = '') => `
        <div class="stat-box ${themeClass}">
          <div class="stat-value">${val}</div>
          <div class="stat-label">${label}</div>
        </div>
      `;

      const isNGO = state.mode === 'nonprofit';

      grid.innerHTML = `
        ${statCard('Score', state.score, state.score > 70 ? 'high' : (state.score < 40 ? 'danger' : ''))}
        ${statCard(isNGO ? 'Funding' : 'Budget', '$' + state.budget)}
        ${statCard(isNGO ? 'Impacted' : 'Users', state.users)}
        ${statCard(isNGO ? 'Ops Risk' : 'Risk', state.risk + '%', state.risk > 50 ? 'danger' : '')}
        ${statCard(isNGO ? 'Comm Trust' : 'Retention', state.retention + '%')}
        ${statCard(isNGO ? 'Efficiency' : 'Growth', state.growth + '%')}
      `;

      if (state.score_breakdown) {
        const bzTips = { s1: "How well the problem and solution are defined.", s2: "How effectively the product addresses market needs.", s3: "The startup's ability to grow rapidly without breaking." };
        const ngoTips = { s1: "Mission Alignment: The core ethical drive and relevance of the NGO.", s2: "Field Ops: The tactical ability to execute groundwork effectively.", s3: "Sustainability: The long-term viability of the community impact." };
        const tips = isNGO ? ngoTips : bzTips;
        
        const lbl1 = document.getElementById('lblScore1');
        lbl1.innerText = isNGO ? 'Mission Alignment:' : 'Idea Clarity:';
        lbl1.title = tips.s1;
        lbl1.style.cursor = 'help';
        lbl1.style.textDecoration = 'underline dotted';
        
        const lbl2 = document.getElementById('lblScore2');
        lbl2.innerText = isNGO ? 'Field Ops:' : 'Market Fit:';
        lbl2.title = tips.s2;
        lbl2.style.cursor = 'help';
        lbl2.style.textDecoration = 'underline dotted';
        
        const lbl3 = document.getElementById('lblScore3');
        lbl3.innerText = isNGO ? 'Sustainability:' : 'Scalability:';
        lbl3.title = tips.s3;
        lbl3.style.cursor = 'help';
        lbl3.style.textDecoration = 'underline dotted';
        
        document.getElementById('scoreIdea').innerText = state.score_breakdown.score1;
        document.getElementById('scoreMarket').innerText = state.score_breakdown.score2;
        document.getElementById('scoreScale').innerText = state.score_breakdown.score3;
      }
    }

    async function fetchScenario() {
      if (!currentState) return;
      toggleLoader('loaderScenario', true);
      document.getElementById('scenarioTierBadge').style.display = 'none';
      document.getElementById('feedbackOptions').style.display = 'none';
      document.getElementById('feedbackSuggestions').style.display = 'none';
      document.getElementById('scenarioText').innerText = "Generating next major hurdle...";

      const diffElement = document.getElementById('scenarioDifficulty');
      const difficultyLevel = diffElement ? diffElement.value : "Medium";

      try {
        const res = await fetch(`${API_URL}/generate-scenario`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ state: currentState, difficultyLevel, mode: currentState.mode })
        });
        const data = await res.json();
        toggleLoader('loaderScenario', false);

        log('SCENARIO GENERATED', data);

        document.getElementById('scenarioSection').style.display = 'block';
        document.getElementById('scenarioText').innerText = `"${data.scenario}"`;

        if (data.tier) {
          const badge = document.getElementById('scenarioTierBadge');
          badge.className = 'tier-badge tier-' + data.tier;
          badge.innerText = data.tier + " Difficulty";
          badge.style.display = 'inline-block';
        }

        const choicesContainer = document.getElementById('choicesContainer');
        choicesContainer.innerHTML = '';
        choicesContainer.style.display = 'flex';

        data.choices.forEach(choice => {
          const group = document.createElement('div');
          group.className = 'choice-group';

          const btn = document.createElement('button');
          btn.className = 'brutal-btn';
          btn.style.background = '#fff';
          btn.style.width = '100%';
          btn.innerText = choice.action || choice;
          btn.onclick = () => makeDecision(choice.action || choice);

          const preview = document.createElement('div');
          preview.className = 'choice-preview';
          preview.innerText = choice.preview || '???';

          group.appendChild(btn);
          group.appendChild(preview);
          choicesContainer.appendChild(group);
        });

      } catch (e) {
        toggleLoader('loaderScenario', false);
        log('ERROR', e);
      }
    }

    async function makeDecision(decision) {
      try {
        stateBeforeDecision = JSON.parse(JSON.stringify(currentState));
        pendingDecision = decision;

        // Step 1: Simulate the step locally/deterministically IMMEDIATELY
        const stepRes = await fetch(`${API_URL}/simulate-step`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ state: currentState, decision })
        });
        const stepData = await stepRes.json();

        // Update state on frontend
        currentState = stepData.new_state;
        updateDashboard(currentState);

        log('SIMULATION RESULT', stepData);

        // UI transitions: Hide choices, show post-decision feedback options
        document.getElementById('choicesContainer').style.display = 'none';
        document.getElementById('scenarioText').innerText = `Decision made: ${decision}. Check your updated matrix. Would you like AI to deep-dive into the trade-offs?`;

        document.getElementById('feedbackOptions').style.display = 'flex';

      } catch (e) {
        log('ERROR', e);
      }
    }

    async function getFeedback(type) {
      toggleLoader('loaderChoice', true);
      document.getElementById('feedbackOptions').style.display = 'none'; // hide buttons immediately
      
      let sec = 0;
      let estTimer = null;
      if (type === 'explain') {
         document.getElementById('scenarioText').innerText = "Generating Detailed Summary...\nEstimated time: ~5 seconds.";
         estTimer = setInterval(() => {
           sec++;
           document.getElementById('scenarioText').innerText = `Generating Detailed Summary...\nElapsed time: ${sec}s (Estimated ~5-8s).`;
         }, 1000);
      } else {
         document.getElementById('scenarioText').innerText = "Generating Quick Summary...";
      }

      try {
        const fbRes = await fetch(`${API_URL}/feedback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            previous_state: stateBeforeDecision,
            decision: pendingDecision,
            new_state: currentState,
            type: type,
            mode: currentState.mode
          })
        });
        const fbData = await fbRes.json();
        log('AI FEEDBACK', fbData);

        if (estTimer) clearInterval(estTimer);
        document.getElementById('scenarioText').innerText = fbData.feedback;

        if(fbData.suggestions && fbData.suggestions.length > 0) {
          const sList = document.getElementById('suggestionsList');
          sList.innerHTML = '';
          fbData.suggestions.forEach(s => {
            const li = document.createElement('li');
            li.innerText = s;
            li.style.marginBottom = '8px';
            sList.appendChild(li);
          });
          document.getElementById('suggestionsTitle').innerText = currentState.mode === 'nonprofit' ? 'Compassionate Suggestions' : 'Strategic Suggestions';
          document.getElementById('feedbackSuggestions').style.display = 'block';
        }

        toggleLoader('loaderChoice', false);
      } catch (e) {
        if (typeof estTimer !== 'undefined' && estTimer) clearInterval(estTimer);
        toggleLoader('loaderChoice', false);
        log('ERROR', e);
        document.getElementById('scenarioText').innerText = "Generation failed. Check console.";
      }
    }
  </script>
</body>

</html>
